metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"
replication_mode = "none"
metadata_auto_snapshot_interval = "6h"

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "garage:3901"
rpc_secret = "harmonie-garage-rpc-secret"

compression_level = 2

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "harmonie-admin-token"
metrics_token = "harmonie-metrics-token"
